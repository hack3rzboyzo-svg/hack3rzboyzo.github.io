<!DOCTYPE html>
<html lang="en">
<head>
<style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #111; color: #00ffcc; }
    .cube-container { perspective: 1000px; }
    .cube { width: 200px; height: 200px; transform-style: preserve-3d; animation: rotateCube 10s infinite linear; }
    .face { position: absolute; width: 200px; height: 200px; display: flex; justify-content: center; align-items: center; font-size: 80px; border: 2px solid #00ffcc; }
    .front  { transform: rotateY(0deg) translateZ(100px); }
    .back   { transform: rotateY(180deg) translateZ(100px); }
    @keyframes rotateCube { from { transform: rotateX(0deg) rotateY(0deg); } to { transform: rotateX(360deg) rotateY(360deg); } }
</style>
</head>
<body>
    <div class="cube-container">
        <div class="cube">
            <div class="face front">A</div><div class="face back">B</div>
        </div>
    </div>
</body>
</html>

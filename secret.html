<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Page</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

input{
    padding:10px;
    border:none;
    border-radius:5px;
    margin-top:10px;
    font-size:16px;
}

button{
    padding:10px 15px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    background:#00ff00;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00cc00;
}

#error{
    color:red;
    margin-top:10px;
}

/* hidden content */
#secretContent{
    display:none;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔒 Enter Password</h1>

<input type="password" id="passwordInput" placeholder="Enter password">
<br>
<button onclick="checkPassword()">Unlock</button>

<p id="error"></p>

<!-- SECRET CONTENT -->
<div id="secretContent">
    <h2>😎 Welcome to the Secret Area</h2>
    <p>You made it in!</p>

    <!-- you can put anything here -->
    <iframe src="snake.html" width="500" height="300"></iframe>
</div>

</div>

<script>
const PASSWORD = "1234"; // 🔥 CHANGE THIS TO YOUR PASSWORD

function checkPassword(){
    let input = document.getElementById("passwordInput").value;

    if(input === PASSWORD){
        document.getElementById("secretContent").style.display = "block";
        document.getElementById("error").textContent = "";
    } else {
        document.getElementById("error").textContent = "Wrong password!";
    }
}
</script>

</body>
</html>

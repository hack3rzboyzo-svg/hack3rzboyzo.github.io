<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exclusive Gooner content</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0f2c;
    --bg2: #0d1540;
    --accent: #7dd3fc;
    --gold: #ffd700;
    --red: #ff2244;
    --text: #e0eaff;
    --green: #0c5b29;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 30%, rgba(0,40,120,0.35) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 70%, rgba(0,20,80,0.3) 0%, transparent 60%);
    color: var(--text);
    font-family: 'Orbitron', sans-serif;
    padding: 40px 20px;
    text-align: center;
    min-height: 100vh;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    letter-spacing: 3px;
  }

  .header-section {
    margin-bottom: 60px;
    animation: fadeDown 0.8s ease both;
  }
  .header-section h1 { color: var(--accent); text-shadow: 0 0 20px rgba(125,211,252,0.6); }
  .header-section p { margin-top: 10px; font-size: 1rem; letter-spacing: 4px; color: #bae6fd; }

  .meet-section {
    margin-bottom: 70px;
    animation: fadeDown 0.8s 0.35s ease both;
  }
  .meet-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 3.5vw, 2.2rem);
    color: var(--accent);
    text-shadow: 0 0 20px rgba(125,211,252,0.5);
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  .meet-subtitle {
    font-size: 0.75rem;
    letter-spacing: 5px;
    color: #7dd3fc;
    margin-bottom: 36px;
    text-transform: uppercase;
  }
  .meet-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
    max-width: 900px;
    margin: 0 auto;
  }
  .meet-card {
    background: rgba(125,211,252,0.05);
    border: 1px solid rgba(125,211,252,0.2);
    border-radius: 12px;
    padding: 20px;
    width: 280px;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .meet-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(125,211,252,0.15);
  }
  .meet-card video {
    width: 100%;
    border-radius: 10px;
    border: 2px solid rgba(125,211,252,0.35);
    background: #000;
  }
  .meet-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.9rem;
    color: var(--accent);
    letter-spacing: 2px;
    margin: 14px 0 8px;
  }
  .meet-role {
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: #93c5fd;
    text-transform: uppercase;
  }
  .video-link {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 18px;
    background: rgba(255,215,0,0.12);
    border: 1px solid rgba(255,215,0,0.35);
    color: var(--gold);
    text-decoration: none;
    border-radius: 8px;
    font-size: 0.75rem;
    letter-spacing: 2px;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .video-link:hover {
    background: rgba(255,215,0,0.2);
    box-shadow: 0 0 16px rgba(255,215,0,0.15);
  }

  footer {
    margin-top: 80px;
    font-size: 0.6rem;
    letter-spacing: 4px;
    color: rgba(192,132,252,0.3);
    text-transform: uppercase;
    animation: fadeDown 0.8s 0.6s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

  <div class="header-section">
    <h1>Exclusive Gooner content</h1>
    <p>Secret footage from the Depths of hell</p>
  </div>

  <div class="meet-section">
    <h2 class="meet-title">MOVS COLLECTION</h2>
    <p class="meet-subtitle">Exclusive videos for the Lunar Gooners</p>
    <div class="meet-grid">

      <div class="meet-card">
        <video controls>
          <source src="./Movs/26272.mp4" type="video/mp4">
          Your browser does not support video playback.
        </video>
        <p class="meet-name">26272.mp4</p>
        <p class="meet-role">Exclusive clip</p>
        <a class="video-link" href="./Movs/26272.mp4" download>Download</a>
      </div>

      <div class="meet-card">
        <video controls>
          <source src="./Movs/IMG_1441.MOV" type="video/quicktime">
          Your browser does not support MOV playback.
        </video>
        <p class="meet-name">IMG_1441.MOV</p>
        <p class="meet-role">Lunar moments</p>
        <a class="video-link" href="./Movs/IMG_1441.MOV" download>Download</a>
      </div>

      <div class="meet-card">
        <video controls>
          <source src="./Movs/IMG_1443.MOV" type="video/quicktime">
          Your browser does not support MOV playback.
        </video>
        <p class="meet-name">IMG_1443.MOV</p>
        <p class="meet-role">Untold footage</p>
        <a class="video-link" href="./Movs/IMG_1443.MOV" download>Download</a>
      </div>

    </div>
  </div>

  <div style="margin-top: 60px; display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
    <a href="./hidden.html" style="display: inline-block; padding: 12px 24px; background: rgba(125,211,252,0.12); border: 1px solid rgba(125,211,252,0.4); color: var(--accent); text-decoration: none; border-radius: 8px; font-size: 0.85rem; letter-spacing: 2px; transition: background 0.2s;">👑 Members Area</a>
  </div>

  <footer>☽ Lunar Gooners · Eyes Open · Always ☾</footer>

</body>
</html>
